# Trading Oracle 설정
# ANTHROPIC_API_KEY는 환경변수로 설정하세요

# 관심 종목 (종목코드)
# 비어있으면 자동으로 주도주 스크리닝
watchlist: []

# 투자 성향
risk_tolerance: moderate  # conservative, moderate, aggressive

# 총 투자 가능 금액 (원)
total_capital: 10000000

# 최대 종목 수
max_positions: 3

# 손절매 기준 (%)
stop_loss_pct: 10

# 추적 손절매 기준 (고점 대비 %)
trailing_stop_pct: 10

# 기술적 분석 파라미터 (auto-researchtrading 기반)
signals:
  ema_fast: 5
  ema_slow: 20
  rsi_period: 8
  rsi_overbought: 69
  rsi_oversold: 31
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bb_period: 20
  momentum_window: 20
  min_votes: 4  # 6개 시그널 중 최소 동의 수 (백테스트 최적: 4)

# LLM 설정
# provider: anthropic (기본) 또는 codex (OpenAI Codex, OAuth 필요)
# codex 사용 시: uv run main.py codex-login 으로 먼저 로그인
llm:
  provider: codex
  model: gpt-5.4
  max_tokens: 4096

# 포지션 사이징 설정
position_sizing:
  # BUY: 합의 강도별 자산 대비 리스크 허용치 (%)
  risk_per_trade:
    very_high: 3    # 만장일치
    high: 2         # 강한 합의
    moderate: 1     # 약한 합의
  # BUY: 분할 매수 1차 비율 (%)
  first_tranche:
    very_high: 50
    high: 33
    moderate: 25
  # SELL: 합의 강도별 매도 비율 (%)
  sell_ratio:
    very_high: 100  # 전량
    high: 67        # 2/3
    moderate: 33    # 1/3
  # 종목당 최대 비중 (%)
  max_weight_pct: 33
  # 포트폴리오 총 손실 한도 (%) — 초과 시 강제 감축
  portfolio_loss_limit: -10
  # 현금 비중 하한 (%) — 레짐별
  cash_floor:
    bull: 20
    bear: 30
    sideways: 25

# 환율 팩터 설정 (Phase 17)
forex:
  beta_window: 60
  beta_export_threshold: 0.3
  beta_import_threshold: -0.3
  regime_ma_short: 20
  regime_ma_long: 60
  regime_extreme_threshold: 5.0
  sizing_adjustment:
    weak_export: 1.15
    weak_import: 0.85
    strong_export: 0.90
    strong_import: 1.10
    extreme_cap: 0.70

# 상관 리스크 관리 (Phase 19)
correlation:
  max_pair_correlation: 0.7     # 이 이상이면 동시 보유 차단
  window_days: 60               # 상관계수 롤링 윈도우 (거래일)
  sector_concentration_limit: 50  # 단일 섹터 최대 비중 %

# 웹 검색 설정 (DuckDuckGo 기반, API 키 불필요)
web_search:
  enabled: true           # false로 끄면 검색 없이 기존 동작
  max_news: 7             # 뉴스 최대 건수
  max_text: 5             # 텍스트 검색 최대 건수
  cache_ttl_hours: 12     # 캐시 TTL (시간)
  rate_limit_sec: 0.5     # 검색 간 대기 시간

recommend:
  default_market: KR
  universe_size:
    KOSPI: 50
    KOSDAQ: 50
    NASDAQ: 50
    NYSE: 50
  diversification:
    sector_cap: 1
    prefer_market_balance: true
    relax_market_balance_if_needed: true
    relax_sector_cap_if_needed: true
